{% extends "base.html" %}
{% block title %}Order — Maher Executive{% endblock %}
{% block head_extra %}
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
{% endblock %}
{% block content %}
<section class="account-shell account-shell--orders" data-account-page="order_detail" data-order-id="{{ order_id }}">
  <aside class="account-sidebar">
    <div class="account-member-card">
      <div class="account-member-avatar" id="account-avatar">A</div>
      <div>
        <p class="account-member-name" id="account-name-side">Maher Executive</p>
        <p class="account-member-tier">Elite Member</p>
      </div>
    </div>
    <nav class="account-nav">
      <a href="/account/profile">Personal Details</a>
      <a class="active" href="/account/orders">Order History</a>
      <a href="/account/addresses">Shipping Addresses</a>
      <a href="/wishlist">My Wishlist</a>
      <button type="button" id="account-signout">Sign Out</button>
    </nav>
  </aside>

  <div class="account-main account-main--orders">
    <header class="oh-hero">
      <h1 class="oh-title">ORDER DETAIL</h1>
      <div class="oh-title-accent" aria-hidden="true"></div>
    </header>
    <div id="order-detail-host" class="oh-stack"></div>
  </div>
</section>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/account.js') }}"></script>
{% endblock %}
