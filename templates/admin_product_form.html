{% extends "base.html" %}
{% block title %}{{ 'Edit' if product else 'New' }} Product{% endblock %}
{% block content %}
<section class="auth-box large">
  <h1>{{ 'Edit' if product else 'Add' }} Product</h1>
  <form method="post">
    <input name="name" placeholder="Name" value="{{ product['name'] if product else '' }}" required />
    <input name="slug" placeholder="Slug" value="{{ product['slug'] if product else '' }}" required />
    <input name="collection" placeholder="Collection" value="{{ product['collection'] if product else '' }}" required />
    <input name="sku" placeholder="SKU" value="{{ product['sku'] if product else '' }}" required />
    <input type="number" name="stock" placeholder="Stock" value="{{ product['stock'] if product else 0 }}" required />
    <input name="sizes" placeholder="Sizes comma separated" value="{{ (product['sizes_json']|from_json)|join(', ') if product else '' }}" required />
    <input name="image_url" placeholder="Image URL" value="{{ product['image_url'] if product else '' }}" required />
    <input type="number" step="0.01" name="price_inr" placeholder="Price INR" value="{{ product['price_inr'] if product else '' }}" required />
    <input type="number" step="0.01" name="price_usd" placeholder="Price USD" value="{{ product['price_usd'] if product else '' }}" required />
    <textarea name="description" placeholder="Description" required>{{ product['description'] if product else '' }}</textarea>
    <label><input type="checkbox" name="is_active" {% if not product or product['is_active'] %}checked{% endif %}/> Active</label>
    <button class="btn btn-gold">Save Product</button>
  </form>
</section>
{% endblock %}
